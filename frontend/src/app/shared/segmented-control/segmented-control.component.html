<div class="segmented" [class.segmented--md]="size() === 'md'" role="group" [attr.aria-label]="label() ?? null">
  @if (label(); as l) {
    <span class="segmented__label">{{ l }}</span>
  }
  <div class="segmented__group">
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="segmented__option"
        [class.is-active]="option.value === value()"
        [attr.aria-pressed]="option.value === value()"
        (click)="select(option)"
      >
        {{ option.label }}
      </button>
    }
  </div>
</div>
