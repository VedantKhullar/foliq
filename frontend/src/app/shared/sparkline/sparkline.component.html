<svg
  class="sparkline"
  [attr.viewBox]="viewBox()"
  [attr.width]="width()"
  [attr.height]="height()"
  preserveAspectRatio="none"
  aria-hidden="true"
>
  <path class="sparkline__area" [attr.d]="area()" [attr.fill]="fill()" />
  <path
    class="sparkline__line"
    [attr.d]="path()"
    [attr.stroke]="stroke()"
    fill="none"
    stroke-width="1.25"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
