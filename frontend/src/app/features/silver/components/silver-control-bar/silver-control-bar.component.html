<header class="control-bar">
  <div class="control-bar__heading">
    <div class="control-bar__crumbs">
      <span>Markets</span>
      <span class="control-bar__crumb-sep">/</span>
      <span>Precious metals</span>
    </div>
    <h1 class="control-bar__title">
      <span class="control-bar__title-text">Silver</span>
      <span class="control-bar__status" aria-label="Live">
        <span class="control-bar__pulse"></span>
        Live
      </span>
    </h1>
    <p class="control-bar__subtitle">
      Track silver across exchanges, currencies, flows, and market catalysts.
    </p>
  </div>

  <div class="control-bar__controls">
    <app-segmented-control
      label="Exchange"
      [options]="exchangeOptions"
      [value]="exchange()"
      (valueChange)="onExchangeChange($event)"
    />
    <app-segmented-control
      label="Currency"
      [options]="currencyOptions"
      [value]="currency()"
      (valueChange)="onCurrencyChange($event)"
    />
  </div>
</header>
